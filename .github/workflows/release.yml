name: Release on tag
on:
  push:
    tags:
      - 'v*'

jobs:
  build_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync package.json version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/web

  deploy_firebase:
    needs: build_web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAKE_A_SET }}
          channelId: live
          projectId: make-a-set

  build_desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            package_cmd: "npx electron-builder --linux --config electron-builder.config.ts"
            artifact_name: desktop-linux
            asset_glob: |
              dist/desktop/*.AppImage
              dist/desktop/*.flatpak
          - os: windows-latest
            platform: win
            package_cmd: "npx electron-builder --win --config electron-builder.config.ts"
            artifact_name: desktop-windows
            asset_glob: |
              dist/desktop/*.exe
              dist/desktop/*.zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Flatpak SDK (Linux only)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 org.electronjs.Electron2.BaseApp//24.08
      - run: npm ci
      - name: Sync package.json version from tag
        run: npm version "${{ github.ref_name }}" --no-git-tag-version
      - name: Build Electron app
        run: npm run build:electron
      - name: Package desktop (${{ matrix.platform }})
        run: ${{ matrix.package_cmd }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_glob }}

  create_release:
    needs: build_desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: release-assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  build_web_itchio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync package.json version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - run: npm run build
        env:
          VITE_BASE: './'
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist-itchio
          path: dist/web

  deploy_itchio:
    needs: [build_web_itchio, build_desktop, create_release]
    runs-on: ubuntu-latest
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-dist-itchio
          path: web
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: desktop-linux
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: desktop-windows

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push web build
        run: ./butler push web deegeegames/all-or-nothing:html5 --userversion "${{ github.ref_name }}"
      - name: Push Linux AppImage build
        run: ./butler push desktop-linux/*.AppImage deegeegames/all-or-nothing:linux --userversion "${{ github.ref_name }}"
      - name: Push Linux Flatpak build
        run: ./butler push desktop-linux/*.flatpak deegeegames/all-or-nothing:linux-flatpak --userversion "${{ github.ref_name }}"
      - name: Push Windows build
        run: ./butler push desktop-windows deegeegames/all-or-nothing:windows --userversion "${{ github.ref_name }}"

  sync_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - name: Update package.json version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet && echo "package.json already up to date" && exit 0
          git commit -m "chore: sync version to ${GITHUB_REF_NAME}"
          git push origin master
